services:
  backend:
    build:
      context: ./backend
    container_name: hll-vietnam-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  historical-runner:
    build:
      context: ./backend
    container_name: hll-vietnam-historical-runner
    command: ["python", "-m", "app.historical_runner", "--hourly"]
    env_file:
      - ./backend/.env.example
    depends_on:
      - backend
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: hll-vietnam-frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped
